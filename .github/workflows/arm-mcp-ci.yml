name: ARM MCP Analysis CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: arm-mcp-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ARM_MCP_IMAGE: armlimited/arm-mcp:latest

jobs:
  detect:
    name: Detect project
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.detect.outputs.languages }}
      has_dockerfile: ${{ steps.detect.outputs.has_dockerfile }}
      docker_images: ${{ steps.detect.outputs.docker_images }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ci/requirements.txt

      - name: Install CI dependencies
        run: pip install -r ci/requirements.txt

      - name: Detect languages and build targets
        id: detect
        run: python ci/detect_project.py --github-output "$GITHUB_OUTPUT"

  arm-mcp-analysis:
    name: ARM MCP analysis
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ci/requirements.txt

      - name: Install CI dependencies
        run: pip install -r ci/requirements.txt

      - name: Pull ARM MCP server image
        run: docker pull "$ARM_MCP_IMAGE"

      - name: Run ARM MCP analysis
        env:
          WORKSPACE: ${{ github.workspace }}
          LANGUAGES: ${{ needs.detect.outputs.languages }}
          DOCKER_IMAGES: ${{ needs.detect.outputs.docker_images }}
        run: python ci/run_analysis.py
        timeout-minutes: 30

      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arm-mcp-report
          path: ci-output/
          retention-days: 7

  report:
    name: Post PR feedback
    needs: [arm-mcp-analysis]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: arm-mcp-report
          path: ci-output
          continue-on-error: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ci/requirements.txt

      - name: Install CI dependencies
        run: pip install -r ci/requirements.txt

      - name: Generate and post report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ANALYSIS_RESULT: ${{ needs.arm-mcp-analysis.result }}
        run: python ci/post_pr_comment.py
