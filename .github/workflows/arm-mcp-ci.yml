name: ARM MCP Cross-Architecture CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: arm-mcp-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ARM_MCP_IMAGE: armlimited/arm-mcp:latest

jobs:
  detect:
    name: Detect project
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.detect.outputs.languages }}
      has_dockerfile: ${{ steps.detect.outputs.has_dockerfile }}
      docker_images: ${{ steps.detect.outputs.docker_images }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ci/requirements.txt

      - name: Install CI dependencies
        run: pip install -r ci/requirements.txt

      - name: Detect languages and build targets
        id: detect
        run: python ci/detect_project.py --github-output "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.label }})
    needs: detect
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            label: x86_64
            runner: ubuntu-latest
          - arch: arm64
            label: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ci/requirements.txt

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            golang-go python3-dev python3-pip python3-venv
          pip install -r ci/requirements.txt

      - name: Build on ${{ matrix.label }}
        id: build
        run: |
          set +e
          bash ci/build_project.sh "${{ matrix.arch }}" 2>&1 | tee "build-${{ matrix.label }}.log"
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "{\"arch\":\"${{ matrix.label }}\",\"status\":\"$([ \"$exit_code\" -eq 0 ] && echo success || echo failure)\",\"exit_code\":$exit_code}" > "build-status-${{ matrix.label }}.json"
          exit "$exit_code"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.label }}
          path: |
            build-${{ matrix.label }}.log
            build-status-${{ matrix.label }}.json
          retention-days: 7

      - name: Upload build artifacts for MCA
        if: steps.build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.label }}
          path: |
            build/
            dist/
            target/release/
            *.o
            *.s
          if-no-files-found: ignore
          retention-days: 1

  arm-mcp-analysis:
    name: ARM MCP analysis
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI dependencies
        run: pip install -r ci/requirements.txt

      - name: Pull ARM MCP server image
        run: docker pull "$ARM_MCP_IMAGE"

      - name: Run ARM MCP analysis
        env:
          WORKSPACE: ${{ github.workspace }}
          LANGUAGES: ${{ needs.detect.outputs.languages }}
          DOCKER_IMAGES: ${{ needs.detect.outputs.docker_images }}
        run: python ci/run_analysis.py
        timeout-minutes: 30

      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arm-mcp-report
          path: ci-output/
          retention-days: 7

  report:
    name: Post PR feedback
    needs: [detect, build, arm-mcp-analysis]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: build-log-*
          merge-multiple: true
          path: ci-output/build-logs

      - uses: actions/download-artifact@v4
        with:
          name: arm-mcp-report
          path: ci-output
          continue-on-error: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install comment dependencies
        run: pip install -r ci/requirements.txt

      - name: Generate and post report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python ci/post_pr_comment.py
